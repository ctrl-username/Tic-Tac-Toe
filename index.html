<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe</title>
  <link href="style.css" rel="stylesheet">
</head>

<body>
  <div id="container">
    <div class="header">
      <h1 class="title">Tic Tac Toe</h1>
      <p class="subtitle">a game of wood and wit</p>
    </div>

    <div id="scoreboard">
      <div id="scoreboard-x">X</div> <span class="bridge">vs</span>
      <div id="scoreboard-o">O</div>
    </div>

    <div id="status-bar">
      Players X turn
    </div>

    <div id="board">



      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>
      <div class="cells"></div>

    </div>

    <div id="controls"></div>
    <div id="footer">what's the path to the red lotus ridge?</div>
</body>

</html>
